name: Charm checks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_call:
  workflow_dispatch:

permissions: {}

jobs:
  charm-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
      - name: Install tox and tox-uv
        run: uv tool install tox --with tox-uv
      - name: Check kubernetes
        run: |
          cd kubernetes
          tox -e lint,unit
      - name: Implement and check kubernetes-extra
        run: |
          uv run kubernetes-extra  # Includes linting and unit tests.
          # Check that the implemented charm matches the one stored in the repo.
          # We don't care about differences in versions of transitive deps.
          git add --all
          git diff --exit-code HEAD -- . ':(exclude)kubernetes-extra/uv.lock'
      - name: Check machine
        run: |
          cd machine
          tox -e lint,unit
