name: Current with Charmcraft main

on:
  schedule:
    - cron: "50 22 * * 0"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review  # Triggers on the transition. GitHub doesn't do this by default.
  push:
    branches:
      - main
  workflow_call:
  workflow_dispatch:

permissions: {}

jobs:
  current:
    # We typically leave a PR in draft status until the corresponding Charmcraft PR has merged.
    # So we only want to check against Charmcraft on non-draft PRs.
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v6
        with:
          path: initial-charms
          persist-credentials: false
      - name: Checkout Charmcraft
        uses: actions/checkout@v6
        with:
          repository: canonical/charmcraft
          path: charmcraft
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
      - name: Set up Charmcraft
        run: |
          sudo apt-get update
          cd charmcraft
          make setup
      - name: Generate charms
        run: |
          cd initial-charms
          CHARMCRAFT_DIR=../charmcraft uvx --from rust-just just init
          git add --all
          git diff --exit-code HEAD
