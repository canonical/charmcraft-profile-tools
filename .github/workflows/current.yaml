name: Current with Charmcraft main

on:
  schedule:
    - cron: "50 22 * * 0"
  pull_request:
    paths:
      - kubernetes/**
      - machine/**
    types:
      - ready_for_review
  push:
    branches:
      - main
  workflow_call:
  workflow_dispatch:

permissions: {}

jobs:
  current:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v6
        with:
          path: charmcraft-profile-tools
          persist-credentials: false
      - name: Checkout Charmcraft
        uses: actions/checkout@v6
        with:
          repository: canonical/charmcraft
          path: charmcraft
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
      - name: Set up Charmcraft
        run: |
          sudo apt-get update
          cd charmcraft
          make setup
      - name: Generate charms
        run: |
          cd charmcraft-profile-tools
          CHARMCRAFT_DIR=../charmcraft uv run kubernetes
          CHARMCRAFT_DIR=../charmcraft uv run machine
          git add --all
          git diff --exit-code HEAD
